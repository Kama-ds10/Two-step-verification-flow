<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checking Database - Verifyd</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Logo -->
    

    <!-- Stepper -->
    <div class="stepper">
      <div class="step completed">
        <div class="step-num">1</div>
        <span>Enter details</span>
      </div>
      <div class="step-line completed"></div>
      <div class="step active">
        <div class="step-num">2</div>
        <span>Checking database</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-num">3</div>
        <span>View Result</span>
      </div>
    </div>

    <!-- Center Card -->
    <div class="loader-card">
      <!-- Circular Progress -->
      <div class="circle-loader">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#e5e7eb" stroke-width="5"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="#0a5c2c" stroke-width="5" 
                  stroke-dasharray="213" stroke-dashoffset="160" stroke-linecap="round"
                  transform="rotate(-90 40 40)" class="progress-circle"/>
        </svg>
      </div>

      <h2 class="nafdac-number" id="nafdac-display">A1 - 1234</h2>
      <p class="loader-text">Querying NAFDAC registration database...</p>

      <!-- Checklist -->
      <div class="checklist">
        <div class="check-item active" id="check-1">
          <div class="check-circle"></div>
          <span>Validating number format</span>
        </div>
        <div class="check-item" id="check-2">
          <div class="check-circle"></div>
          <span>Searching product registry</span>
        </div>
        <div class="check-item" id="check-3">
          <div class="check-circle"></div>
          <span>Verifying company records</span>
        </div>
        <div class="check-item" id="check-4">
          <div class="check-circle"></div>
          <span>Checking expiry and status</span>
        </div>
      </div>
    </div>
  </div>
<script src="js/step2.js"></script>
</body>
</html>
